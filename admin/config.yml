local_backend: true

backend:
  name: github
  repo: hcenge/emigroupsite
  branch: main
  base_url: https://emi-cms-oauth.helenengelhardt.workers.dev
  open_authoring: true

publish_mode: editorial_workflow

media_folder: "assets/images"
public_folder: "/images"

collections:
  # ── News ──────────────────────────────────────────────
  - name: "news"
    label: "News"
    folder: "content/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    media_folder: "/assets/images/news"
    public_folder: "/images/news"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Summary", name: "summary", widget: "string" }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }
      - { label: "Body", name: "body", widget: "markdown" }

  # ── People (current members) ──────────────────────────
  - name: "people"
    label: "People"
    folder: "content/people"
    create: true
    media_folder: "/assets/images/people"
    public_folder: "/images/people"
    fields:
      - { label: "Name", name: "title", widget: "string" }
      - label: "Role"
        name: "role"
        widget: "select"
        options:
          - { label: "Principal Investigator", value: "pi" }
          - { label: "Post-doc", value: "postdoc" }
          - { label: "PhD Student", value: "phd" }
          - { label: "Master's Student", value: "masters" }
          - { label: "Visitor", value: "visitor" }
      - { label: "Tagline", name: "tagline", widget: "string", required: false }
      - { label: "Photo", name: "photo", widget: "image", required: false }
      - { label: "Email", name: "email", widget: "string", required: false }
      - { label: "Join Year", name: "join_year", widget: "number", value_type: "int", required: false }
      - { label: "Research Interests", name: "research_interests", widget: "text", required: false }
      - label: "Projects"
        name: "projects"
        widget: "select"
        multiple: true
        required: false
        options:
          - { label: "Electrocatalysis", value: "electrocatalysis" }
          - { label: "Electrolyte Solvation", value: "electrolyte-solvation" }
          - { label: "Electronic Structure", value: "electronic-structure" }
          - { label: "Operando X-ray Techniques", value: "operando-xray-techniques" }
          - { label: "Rechargeable Batteries", value: "rechargeable-batteries" }
          - { label: "Thermocatalysis", value: "thermocatalysis" }
      - { label: "Website", name: "website", widget: "string", required: false }
      - { label: "Twitter", name: "twitter", widget: "string", required: false }
      - { label: "LinkedIn", name: "linkedin", widget: "string", required: false }
      - { label: "Show Date", name: "showdate", widget: "boolean", default: false }
      - { label: "Body", name: "body", widget: "markdown", required: false }

  # ── Alumni ────────────────────────────────────────────
  - name: "alumni"
    label: "Alumni"
    folder: "content/people/alumni"
    create: true
    media_folder: "/assets/images/people"
    public_folder: "/images/people"
    fields:
      - { label: "Name", name: "title", widget: "string" }
      - { label: "Role", name: "role", widget: "hidden", default: "alumni" }
      - { label: "Tagline", name: "tagline", widget: "string", required: false }
      - { label: "Photo", name: "photo", widget: "image", required: false }
      - { label: "Email", name: "email", widget: "string", required: false }
      - { label: "Join Date", name: "join_year", widget: "string", required: false, hint: "e.g. 2021 or 2021-09" }
      - { label: "End Date", name: "end_year", widget: "string", required: false, hint: "e.g. 2022 or 2022-06" }
      - { label: "Now", name: "now", widget: "string", required: false, hint: "Where they are now" }
      - { label: "Research Interests", name: "research_interests", widget: "text", required: false }
      - { label: "Show Date", name: "showdate", widget: "boolean", default: false }
      - { label: "Body", name: "body", widget: "markdown", required: false }

  # ── Research ──────────────────────────────────────────
  - name: "research"
    label: "Research"
    folder: "content/research"
    create: true
    media_folder: "/assets/images/projects"
    public_folder: "/images/projects"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Summary", name: "summary", widget: "text", required: false }
      - { label: "Category", name: "category", widget: "string", required: false }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }
      - { label: "Live", name: "live", widget: "boolean", default: true }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Weight", name: "weight", widget: "number", value_type: "int", required: false }
      - label: "Publications (DOIs)"
        name: "publications"
        widget: "list"
        required: false
        field: { label: "DOI", name: "doi", widget: "string" }
      - { label: "Show Date", name: "showdate", widget: "boolean", default: false }
      - { label: "Body", name: "body", widget: "markdown", required: false }
