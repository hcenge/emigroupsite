name: Update Existing Bio
description: Update an existing group member's bio
title: "Bio update: "
labels: ["content-submission", "bio-update"]
body:
  - type: markdown
    attributes:
      value: |
        Select the person to update, then only fill in the fields you want to change. Everything else will be preserved.

  - type: dropdown
    id: person
    attributes:
      label: Person to Update
      options:
        - Catherine Kohler
        - Connor Sherwin
        - Conor Phelan
        - "Erik Björklund"
        - Francesc Puchal Salat
        - Helen Engelhardt
        - Jack Swallow
        - Jasper Singh
        - Longxiang Liu
        - May Rainbird
        - Peixi Cong
        - Robert Weatherup
        - Seonghyun Kim
        - "Sevinç Yağmur Bekler"
        - Sirui Li
        - Soumyajit Maitra
        - Trevor Binford
        - Will Skinner
        - Yifan Bai
    validations:
      required: true

  - type: dropdown
    id: role
    attributes:
      label: Role
      options:
        - "No change"
        - pi
        - postdoc
        - phd
        - masters
        - visitor

  - type: input
    id: tagline
    attributes:
      label: Tagline
      placeholder: e.g. DPhil Student, Wolfson College

  - type: input
    id: email
    attributes:
      label: Email
      placeholder: e.g. name@materials.ox.ac.uk

  - type: input
    id: join_year
    attributes:
      label: Year Joined
      placeholder: e.g. 2024

  - type: textarea
    id: photo
    attributes:
      label: Profile Photo
      description: Drag and drop a new photo here.
      placeholder: Drag and drop an image file here

  - type: textarea
    id: research_interests
    attributes:
      label: Research Interests
      placeholder: Describe your research interests...

  - type: checkboxes
    id: projects
    attributes:
      label: Projects
      description: Select all projects (this will replace the current list). Leave all unchecked to keep existing projects.
      options:
        - label: Electrocatalysis
        - label: Electrolyte Solvation
        - label: Electronic Structure
        - label: Operando X-ray Techniques
        - label: Rechargeable Batteries
        - label: Thermocatalysis

  - type: textarea
    id: biography
    attributes:
      label: Biography
      description: Full biography in Markdown (replaces the current body text)
      placeholder: Write your biography here...
