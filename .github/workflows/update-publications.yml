name: Update Publications

on:
  schedule:
    - cron: '0 0 * * 0'  # Every Sunday at midnight
  workflow_dispatch:  # Manual trigger from Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Fetch publications
        run: nix develop --command python scripts/fetch_publications.py

      - name: Update DOIs
        run: nix develop --command python scripts/update_dois.py

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Update publications from Google Scholar"
          branch: update-publications
          title: "Update publications from Google Scholar"
          body: |
            Automated weekly publication update from Google Scholar.

            Please review the changes to `data/publications.json` to check for incorrect entries before merging.
          add-paths: data/publications.json
